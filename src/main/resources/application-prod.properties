# Production Configuration for FEAZTO Backend

# Server
server.port=8080

# H2 Database (File-based instead of in-memory to persist data between restarts)
# This prevents Render from complaining and keeps Spring Boot happy
spring.datasource.url=jdbc:h2:file:./data/feazto_prod_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Do NOT drop the database on restart in production
spring.jpa.hibernate.ddl-auto=update

# Disable H2 Console in production
spring.h2.console.enabled=false

# Firebase API Key (Read from environment variables)
feazto.firebase.api-key=${FIREBASE_API_KEY}

# Brevo HTTP API Configuration (Read from environment variables)
feazto.brevo.api-key=${BREVO_API_KEY}
